name: Deploy to Firebase

on:
  push:
    branches:
      - master

# Required for Workload Identity Federation (keyless auth)
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Caches node_modules based on package-lock.json

      - name: Install dependencies
        run: npm ci # Faster & stricter than npm install — respects package-lock.json

      - name: Lint & Build
        run: npm run build # ESLint runs automatically via react-scripts (no longer bypassed)

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@13 deploy --only hosting # Pinned CLI version, no global install
