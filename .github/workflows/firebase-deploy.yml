name: Deploy to Firebase

on:
  push:
    branches:
      - master

# Required for Workload Identity Federation (keyless auth)
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt into Node.js 24 actions runtime (required after June 2026)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Caches node_modules based on package-lock.json

      - name: Install dependencies
        run: npm ci # Faster & stricter than npm install — respects package-lock.json

      - name: Lint & Build
        run: npm run build # ESLint runs automatically via react-scripts (no longer bypassed)

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token' # Mint a short-lived OAuth2 token for firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }} # Short-lived token from WIF, not a stored secret
        run: npx firebase-tools@15 deploy --only hosting # Pinned to latest stable major, no global install
